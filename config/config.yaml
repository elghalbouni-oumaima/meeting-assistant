models:
  summarizer: "facebook/bart-large-cnn"        # lighter than bart-large-cnn, good for dev
  action_extractor: "google/flan-t5-large"
  sentiment: "cardiffnlp/twitter-roberta-base-sentiment-latest"


summarizer:
  max_input_tokens: 1024
  max_output_tokens: 250
  min_output_tokens: 30
  length_penalty: 2
  no_repeat_ngram_size: 3
  num_beams: 4

action_extractor:
  max_input_tokens: 512
  max_new_tokens: 200
  num_beams: 4

rag:
  embedder: "all-MiniLM-L6-v2"
  chunk_size: 60          # words per chunk (meetings are short)
  chunk_overlap: 15       # overlap between chunks
  top_k: 3               # number of chunks to retrieve
  max_new_tokens: 100